global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    site: hotel-iptv

rule_files:
  - rules.yml

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node_exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: monitor-host

  - job_name: iptv_exporter
    static_configs:
      - targets: ["host.docker.internal:9200"]
    scrape_interval: 10s
